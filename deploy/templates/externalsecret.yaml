# Pulls everything Users needs from AWS Secrets Manager into a native K8s
# Secret (users-secrets) that the Deployment mounts via envFrom.
#
# jwt-secret and internal-api-key are plain strings in AWS SM (no `property`,
# whole value used) — SAME entries Auth/Gateway already use, not copies.
#
# amazon-mq, cache-redis, and users/rds are JSON blobs, so each field needs
# its own `property`. secretKey names below match Spring Boot's OWN
# property-binding env var convention (SPRING_RABBITMQ_*, SPRING_DATASOURCE_*,
# SPRING_DATA_REDIS_PASSWORD) — application.yml was updated to reference
# these exact names (see the required code changes that ship alongside this
# chart), same fix pattern as Auth's RabbitMQ mismatch. REDIS_HOST/REDIS_PORT
# keep their existing names since application.yml already expects those
# exact ones unchanged.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: users-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: users-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
    - secretKey: INTERNAL_API_KEY
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/internal-api-key" }
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/users/rds", property: SPRING_DATASOURCE_URL }
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/users/rds", property: SPRING_DATASOURCE_USERNAME }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/users/rds", property: SPRING_DATASOURCE_PASSWORD }
