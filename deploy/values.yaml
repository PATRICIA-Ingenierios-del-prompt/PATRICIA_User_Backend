# Defaults for the Users MS chart. The CD job overrides image.repository and
# image.tag per deploy (pinned to the commit SHA); everything else is edited
# here and versioned with the code it configures.

image:
  repository: ""            # set by CD: <account>.dkr.ecr.<region>.amazonaws.com/patricia-dev/users
  tag: ""                   # set by CD: short commit SHA
  pullPolicy: IfNotPresent

replicaCount: 2

serviceAccount:
  roleArn: "arn:aws:iam::188701360691:role/patricia-dev-users-irsa"

config:
 
  authServiceUrl: "http://auth.patricia-app.svc.cluster.local:8081"
  maxReportesSuspension: "5"
  # Profile-photo upload (onboarding). Deliberately empty for now — the app
  # itself treats an empty bucket as "not configured yet" and fails just that
  # one upload feature with a clear error, instead of failing to boot. Fill
  # in once S3 + IRSA are actually wired up for this service.
  awsS3Bucket: "patricia-dev-uploads-188701360691"
  awsS3PublicUrlBase: "https://d1uaykdrxdyy3x.cloudfront.net"
  awsS3Region: "us-east-1"
  

externalSecrets:
  clusterSecretStore: patricia-aws-secrets-manager
  prefix: "patricia-dev"
  # What's already provisioned in AWS Secrets Manager (confirmed via
  # `aws secretsmanager list-secrets`) — all of it, nothing missing this time:
  #   patricia-dev/jwt-secret     -> EXISTS. Shared with Gateway/Auth (Auth
  #                                  signs, Gateway validates, Users also
  #                                  validates via JwtTokenParser — same
  #                                  entry, not a copy).
  #   patricia-dev/amazon-mq      -> EXISTS. JSON keys SPRING_RABBITMQ_ADDRESSES/
  #                                  USERNAME/PASSWORD (see externalsecret.yaml).
  #   patricia-dev/cache-redis    -> EXISTS. JSON keys REDIS_HOST/REDIS_PORT/
  #                                  REDIS_PASSWORD.
  #   patricia-dev/users/rds      -> EXISTS. JSON keys SPRING_DATASOURCE_URL/
  #                                  USERNAME/PASSWORD — Spring's own binding
  #                                  names, and (unlike Auth's original
  #                                  RabbitMQ mismatch) application.yml was
  #                                  updated to match these exactly, so no
  #                                  renaming needed here, just a straight
  #                                  passthrough.
  #   patricia-dev/internal-api-key -> EXISTS (created for Auth). Reused as-is:
  #                                  this is the shared service-to-service key,
  #                                  not per-service.

resources:
  # El container corre, además del JVM, el sidecar Python (DeepFace/
  # TensorFlow, vía supervisord) en el mismo pod, compartiendo este mismo
  # límite. 1Gi era demasiado ajustado para los dos juntos: TensorFlow solo
  # al importarse ya usa varios cientos de MB, y el JVM sin -Xmx explícito
  # reserva ~25% de lo visible por ergonomía de contenedor. Sospecha de
  # OOMKill en el arranque real (primera vez que la imagen llega a correr
  # tras arreglar el build de Dockerfile) — ver JAVA_OPTS en supervisord.conf
  # para el límite de heap explícito que acompaña este aumento.
  requests: { cpu: 500m, memory: 1536Mi }
  limits:   { cpu: "1.5", memory: 2560Mi }

hpa:
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
