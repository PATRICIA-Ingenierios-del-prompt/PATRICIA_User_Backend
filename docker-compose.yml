version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: usuarios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: ${POSTGRES_USER:-usuarios_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - usuarios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usuarios_user} -d usuarios_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: usuarios-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: usuarios-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # El detector Python (DeepFace) corre DENTRO del mismo contenedor
  # usando supervisord. Solo se expone el puerto 8082 hacia afuera;
  # el detector escucha en localhost:8090 (invisible desde fuera).
  usuarios-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usuarios-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/usuarios_db
      POSTGRES_USER: ${POSTGRES_USER:-usuarios_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MAX_REPORTES_SUSPENSION: ${MAX_REPORTES_SUSPENSION:-5}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      # AWS S3 (fotos de perfil y álbum)
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_PUBLIC_URL_BASE: ${AWS_S3_PUBLIC_URL_BASE:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Variables para el detector Python embebido
      DETECTOR_BACKEND: ${DETECTOR_BACKEND:-retinaface}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
    ports:
      - "8082:8082"
      # Puerto 8090 (detector) NO se expone: solo accesible internamente en localhost

volumes:
  usuarios_postgres_data:
