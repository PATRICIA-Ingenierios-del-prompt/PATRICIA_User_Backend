server:
  port: 8082

spring:
  application:
    name: usuarios-service

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 600000

jwt:
  secret: ${JWT_SECRET}

security:
  internal-api-key: ${INTERNAL_API_KEY}

reportes:
  max-antes-suspension: ${MAX_REPORTES_SUSPENSION:5}

clients:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

# Almacenamiento de fotos de perfil (onboarding). Aún no desplegado: mientras
# aws.s3.bucket esté vacío, subir una foto en el onboarding fallará con un
# error claro en vez de romper el arranque de la app.
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:us-east-1}
    # Si se usa CloudFront u otro dominio propio delante del bucket.
    public-url-base: ${AWS_S3_PUBLIC_URL_BASE:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.escuelaing.usuarios: INFO
