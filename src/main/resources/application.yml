server:
  port: 8082

spring:
  application:
    name: usuarios-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true

  cache:
    type: redis
    redis:
      time-to-live: 600000

jwt:
  secret: ${JWT_SECRET}

security:
  internal-api-key: ${INTERNAL_API_KEY}

reportes:
  max-antes-suspension: ${MAX_REPORTES_SUSPENSION:5}

clients:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  llm-backend:
    url: ${LLM_BACKEND_URL:http://localhost:8083}


aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:us-east-1}
    # Si se usa CloudFront u otro dominio propio delante del bucket.
    public-url-base: ${AWS_S3_PUBLIC_URL_BASE:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
logging:
  level:
    com.escuelaing.usuarios: INFO
